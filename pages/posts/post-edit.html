<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 수정 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/reset.css">
  <link rel="stylesheet" href="../../css/common/variables.css">
  <link rel="stylesheet" href="../../css/common/layout.css">
  <link rel="stylesheet" href="../../css/components/header.css">
  <link rel="stylesheet" href="../../css/components/button.css">
  <link rel="stylesheet" href="../../css/components/form.css">
  <link rel="stylesheet" href="../../css/components/footer.css">
  <link rel="stylesheet" href="../../css/pages/post-create.css">
  <link rel="stylesheet" href="../../css/pages/post-edit.css">
</head>

<body>
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <!-- 메인 컨텐츠 -->
  <main class="container-sm">
    <!-- 로딩 -->
    <div id="loading" class="loading" style="display: none;">
      <div class="loading-text">로딩중...</div>
    </div>

    <div id="editContent" style="display: none;">
      <div class="post-create-card">
        <div class="post-create-header">
          <h1 class="post-create-title">게시글 수정</h1>
        </div>

        <form id="postEditForm">
          <div class="post-create-grid minimalist">
            <div class="post-create-left left-panel">
              <div class="category-rating-row">
                <select id="foodCategory" class="form-select inline-select">
                  <option value="">카테고리</option>
                </select>
                <div class="rating-inline">
                  <input type="number" id="rating" class="form-input rating-inline-input" placeholder="0.0 ~ 5.0"
                    min="0" max="5" step="0.1" required>
                  <div id="ratingStars" class="rating-stars">
                    <span class="star empty">★</span>
                    <span class="star empty">★</span>
                    <span class="star empty">★</span>
                    <span class="star empty">★</span>
                    <span class="star empty">★</span>
                  </div>
                </div>
              </div>

              <input type="hidden" id="restaurantId">
              <div class="title-block">
                <input type="text" id="title" class="form-input title-input" placeholder="제목을 입력하세요" required
                  maxlength="100">
              </div>

              <div class="content-editor">
                <textarea id="content" class="form-textarea" placeholder="내용을 작성해주세요" required
                  rows="12"></textarea>
                <div class="content-tag-bar">
                  <div id="tagList" class="tag-list"></div>
                  <input type="text" id="tagInput" class="tag-input" placeholder="#태그입력">
                </div>
              </div>
              <div id="contentCount" class="content-count">0자</div>
            </div>

            <div class="post-create-right">
              <div class="side-card">
                <div class="form-group">
                  <label for="restaurantAddress">주소</label>
                  <input type="text" id="restaurantAddress" class="form-input" placeholder="주소나 장소명을 검색하세요"
                    maxlength="300">
                  <div id="placeResults" class="place-results" style="display: none;"></div>
                </div>
                <div class="form-group">
                  <label for="kakaoMap">지도</label>
                  <div id="kakaoMap" class="map-container"></div>
                </div>
                <div class="form-group">
                  <label for="restaurantName">맛집명</label>
                  <input type="text" id="restaurantName" class="form-input" placeholder="맛집명을 입력하세요"
                    maxlength="100">
                </div>
              </div>

              <div class="side-card">
                <div class="form-group">
                  <label for="imageFiles">이미지 업로드 (최대 10장)</label>
                  <div id="existingImages" class="existing-images" style="display: none;">
                    <p class="form-help-text">기존 이미지</p>
                    <div id="existingImageGrid" class="image-preview-grid"></div>
                  </div>
                  <input type="file" id="imageFiles" class="form-input" accept="image/*" multiple
                    style="padding: var(--spacing-sm);">
                  <div id="imagePreview" class="image-preview-container" style="display: none;"></div>
                </div>
              </div>
            </div>
          </div>

          <div id="errorMessage" class="error-message" style="display: none;"></div>

          <div class="form-actions" style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-2xl);">
            <button type="submit" id="submitBtn" class="btn btn-primary" style="flex: 1;">
              수정 완료
            </button>
            <button type="button" id="cancelBtn" class="btn btn-secondary" style="flex: 1;">
              취소
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <p class="footer-logo">
        🍽️ 파인잇
      </p>
      <p class="footer-copyright">
        맛있는 순간을 나누는 공간 © 2025
      </p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="../../js/config/kakao-config.js"></script>
  <script>document.write('<scr'+'ipt src="//dapi.kakao.com/v2/maps/sdk.js?appkey='+window.KAKAO_APP_KEY+'&libraries=services"><\/scr'+'ipt>');</script>
  <script type="module" src="../../js/pages/posts/post-edit.js"></script>
  <script type="module" src="../../js/components/header.js"></script>
</body>

</html>
