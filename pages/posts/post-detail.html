<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 상세 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Remix Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/reset.css">
  <link rel="stylesheet" href="../../css/common/variables.css">
  <link rel="stylesheet" href="../../css/components/header.css">
  <link rel="stylesheet" href="../../css/components/footer.css">
  <link rel="stylesheet" href="../../css/pages/post.css">
</head>

<body class="pd-page">

  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <!-- 로딩 -->
  <div id="loading" class="pd-loading" style="display: none;">
    <div class="pd-spinner"></div>
    <p class="pd-loading-text">게시글을 불러오는 중...</p>
  </div>

  <!-- 게시글 상세 -->
  <div id="postDetail" style="display: none;">

    <!-- ===== 히어로 섹션 ===== -->
    <section class="pd-hero">
      <div class="pd-hero-overlay"></div>
      <div class="pd-hero-content">
        <a href="/index.html" class="pd-back-link">
          <i class="ri-arrow-left-line"></i>홈으로
        </a>
        <div class="pd-hero-bottom">
          <span id="categoryBadge" class="category-badge"></span>
          <h1 id="postTitle" class="pd-title"></h1>
          <span id="viewCount" class="pd-view-count-hero"></span>
        </div>
      </div>
    </section>

    <!-- ===== 메인 컨텐츠 ===== -->
    <main class="pd-main">

      <!-- 통합 리뷰 카드 -->
      <div class="pd-card pd-review-card">

        <!-- 작성자 헤더 -->
        <div class="pd-review-header">
          <div id="authorAvatar" class="author-avatar pd-review-avatar"></div>
          <div class="pd-review-author-text">
            <span id="authorName" class="pd-review-author-name"></span>
            <span id="restaurantName" class="pd-review-rest-name"></span>
          </div>
          <div id="authorActions" class="pd-author-actions" style="display: none;">
            <button id="editBtn" class="pd-btn-ghost">
              <i class="ri-edit-2-line"></i>수정
            </button>
            <button id="deleteBtn" class="pd-btn-danger">
              <i class="ri-delete-bin-line"></i>삭제
            </button>
          </div>
        </div>

        <!-- 이미지 -->
        <div id="postImageContainer" class="pd-image-container" style="display: none;">
          <img id="postImage" src="" alt="게시글 이미지" class="pd-image-placeholder">
        </div>

        <!-- 평점 + 날짜 -->
        <div class="pd-review-rating-row">
          <span id="ratingBadge"></span>
          <span id="postDate" class="pd-review-date"></span>
        </div>

        <!-- 게시글 내용 -->
        <div id="postContent" class="pd-content"></div>

        <!-- 태그 -->
        <div id="postTags" class="pd-tags" style="display: none;"></div>

        <!-- 좋아요 텍스트 -->
        <p class="pd-likes-text"><span id="likeCount">0</span>명이 좋아합니다.</p>

        <!-- 구분선 + 액션 버튼 -->
        <div class="pd-review-actions">
          <button id="likeBtn" class="pd-review-action-btn">
            <span id="likeIcon">🤍</span>좋아요
          </button>
          <div class="pd-review-action-sep"></div>
          <button id="shareBtn" class="pd-review-action-btn">
            <i class="ri-share-line"></i>공유
          </button>
        </div>

      </div>

      <!-- 지도 -->
      <div class="pd-card post-map-section">
        <h4 class="pd-card-title">
          <i class="ri-map-pin-line"></i>위치
        </h4>
        <div class="pd-map-addr" id="restaurantAddress"></div>
        <div id="postMap" class="pd-map"></div>
      </div>

      <!-- 댓글 섹션 -->
      <div class="pd-card pd-comments-card">
        <div class="pd-card-header">
          <h4 class="pd-card-title">
            <i class="ri-chat-3-line"></i>댓글
          </h4>
          <div class="pd-comment-header-right">
            <span id="commentCount" class="pd-count-badge">0</span>
            <button id="commentToggleBtn" class="pd-comment-toggle-btn" aria-label="댓글 접기/펼치기">
              <i id="commentToggleIcon" class="ri-arrow-up-s-line"></i>
            </button>
          </div>
        </div>

        <!-- 토글 가능한 영역 -->
        <div id="commentBody">
          <!-- 댓글 작성 폼 -->
          <div id="commentFormContainer" class="pd-comment-form-wrap">
            <form id="commentForm">
              <textarea id="commentInput" class="pd-comment-textarea"
                placeholder="댓글을 입력하세요..." rows="3"></textarea>
              <div class="pd-comment-form-actions">
                <button type="submit" class="pd-comment-submit">댓글 작성</button>
              </div>
            </form>
          </div>

          <!-- 댓글 목록 -->
          <div id="commentList" class="pd-comment-list"></div>

          <!-- 댓글 없음 -->
          <div id="noComments" class="pd-no-comments" style="display: none;">
            <div class="pd-no-icon">💬</div>
            <p class="pd-no-text">아직 댓글이 없어요.<br>첫 댓글을 남겨보세요!</p>
          </div>

          <!-- 페이지네이션 -->
          <div id="commentPagination" class="pd-comment-pagination"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- 푸터 -->
  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="footer-logo-wrap">
            <div class="footer-logo-icon"><i class="ri-restaurant-2-fill"></i></div>
            <span class="footer-logo-text">파인잇</span>
          </div>
          <p class="footer-tagline">당신만의 맛집을 찾고 공유하는 플랫폼</p>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">서비스</h3>
          <ul class="footer-links-list">
            <li><a href="/pages/posts/post-list.html" class="footer-link">맛집 탐색</a></li>
            <li><a href="/pages/category.html" class="footer-link">카테고리</a></li>
            <li><a href="/pages/restaurants/restaurant-list.html" class="footer-link">맛집 목록</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">고객지원</h3>
          <ul class="footer-links-list">
            <li><a href="#" class="footer-link">공지사항</a></li>
            <li><a href="#" class="footer-link">FAQ</a></li>
            <li><a href="#" class="footer-link">문의하기</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">소셜 미디어</h3>
          <div class="footer-social">
            <a href="#" class="footer-social-btn"><i class="ri-instagram-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-facebook-circle-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-youtube-line"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 파인잇. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="#" class="footer-link">이용약관</a>
          <a href="#" class="footer-link">개인정보처리방침</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- 라이트박스 -->
  <div id="lightbox" class="pd-lightbox" style="display:none;" aria-modal="true" role="dialog">
    <div class="pd-lightbox-backdrop"></div>
    <button class="pd-lightbox-close" id="lightboxClose" aria-label="닫기"><i class="ri-close-line"></i></button>
    <button class="pd-lightbox-nav pd-lightbox-prev" id="lightboxPrev" aria-label="이전"><i class="ri-arrow-left-s-line"></i></button>
    <div class="pd-lightbox-img-wrap">
      <img id="lightboxImg" src="" alt="">
    </div>
    <button class="pd-lightbox-nav pd-lightbox-next" id="lightboxNext" aria-label="다음"><i class="ri-arrow-right-s-line"></i></button>
    <div class="pd-lightbox-counter"><span id="lightboxCurrent">1</span> / <span id="lightboxTotal">1</span></div>
  </div>

  <!-- JavaScript -->
  <script src="../../js/config/kakao-config.js"></script>
  <script>
    (function () {
      var s = document.createElement('script');
      s.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=' + window.KAKAO_APP_KEY + '&libraries=services&autoload=false';
      document.head.appendChild(s);
    })();
  </script>
  <script type="module" src="../../js/pages/posts/post-detail.js"></script>
  <script type="module" src="../../js/components/header.js"></script>

</body>

</html>
