<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛집 리뷰 목록 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Remix Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/reset.css">
  <link rel="stylesheet" href="../../css/common/variables.css">
  <link rel="stylesheet" href="../../css/common/layout.css">
  <link rel="stylesheet" href="../../css/components/header.css">
  <link rel="stylesheet" href="../../css/components/button.css">
  <link rel="stylesheet" href="../../css/components/card.css">
  <link rel="stylesheet" href="../../css/components/footer.css">
  <link rel="stylesheet" href="../../css/pages/post-list.css">
</head>

<body class="post-list-page">
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <main class="post-list-container">
    <section class="post-hero">
      <div class="post-hero-text">
        <h1 class="post-hero-title">맛집 리뷰</h1>
        <p class="post-hero-subtitle">전국 곳곳의 맛집 리뷰를 찾아보세요.</p>
      </div>
      <form class="post-search" id="postSearchForm">
        <input type="text" id="searchInput" placeholder="맛집 이름이나 메뉴를 검색하세요" autocomplete="off" />
        <button type="submit" id="searchBtn" class="btn btn-primary">검색</button>
      </form>
    </section>

    <!-- 로딩 -->
    <div id="loading" style="display: none; text-align: center; padding: 2rem; color: #6b7280;">
      로딩중...
    </div>

    <section class="post-grid-section">
      <div class="posts-grid" id="postsGrid"></div>
      <div class="post-empty" id="emptyState" style="display: none;">
        <p>아직 게시글이 없어요. 첫 번째 리뷰를 작성해보세요!</p>
      </div>
      <div class="post-empty" id="noResults" style="display: none;">
        <p>검색 결과가 없습니다.</p>
        <button id="resetSearch" class="btn btn-secondary" style="margin-top: 12px;">전체 보기</button>
      </div>
      <div class="post-actions">
        <div class="post-infinite-status" id="postInfiniteStatus" aria-live="polite"></div>
        <div class="post-infinite-trigger" id="postInfiniteTrigger" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="footer-logo-wrap">
            <div class="footer-logo-icon"><i class="ri-restaurant-2-fill"></i></div>
            <span class="footer-logo-text">파인잇</span>
          </div>
          <p class="footer-tagline">당신만의 맛집을 찾고 공유하는 플랫폼</p>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">서비스</h3>
          <ul class="footer-links-list">
            <li><a href="/pages/posts/post-list.html" class="footer-link">맛집 탐색</a></li>
            <li><a href="/pages/category.html" class="footer-link">카테고리</a></li>
            <li><a href="/pages/restaurants/restaurant-list.html" class="footer-link">맛집 목록</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">고객지원</h3>
          <ul class="footer-links-list">
            <li><a href="#" class="footer-link">공지사항</a></li>
            <li><a href="#" class="footer-link">FAQ</a></li>
            <li><a href="#" class="footer-link">문의하기</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">소셜 미디어</h3>
          <div class="footer-social">
            <a href="#" class="footer-social-btn"><i class="ri-instagram-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-facebook-circle-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-youtube-line"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 파인잇. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="#" class="footer-link">이용약관</a>
          <a href="#" class="footer-link">개인정보처리방침</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="../../js/components/header.js"></script>
  <script type="module" src="../../js/pages/posts/post-list.js"></script>
</body>

</html>
