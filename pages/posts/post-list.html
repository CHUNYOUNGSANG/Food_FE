<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 목록 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Remix Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/reset.css">
  <link rel="stylesheet" href="../../css/common/variables.css">
  <link rel="stylesheet" href="../../css/common/layout.css">
  <link rel="stylesheet" href="../../css/components/header.css">
  <link rel="stylesheet" href="../../css/components/button.css">
  <link rel="stylesheet" href="../../css/components/card.css">
  <link rel="stylesheet" href="../../css/components/footer.css">
  <link rel="stylesheet" href="../../css/pages/post-list.css">
</head>

<body>
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <!-- 메인 컨텐츠 -->
  <main class="container">
    <!-- 히어로 섹션 -->
    <section class="hero-section">
      <div class="hero-content">
        <h1 class="hero-title">
          🍽️ 파인잇 모아보기
        </h1>
        <p class="hero-description">
          전국 곳곳의 맛집을 발견하고 공유하세요
        </p>
      </div>
    </section>

    <!-- 검색 & 필터 -->
    <section class="filter-section">
      <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="맛집 이름이나 메뉴를 검색하세요...">
        <button id="searchBtn" class="btn btn-primary">
          🔍 검색
        </button>
      </div>

      <div class="category-filter">
        <button class="category-btn active" data-category="all">
          전체
        </button>
        <button class="category-btn" data-category="한식">
          🌶️ 한식
        </button>
        <button class="category-btn" data-category="중식">
          🥟 중식
        </button>
        <button class="category-btn" data-category="일식">
          🍱 일식
        </button>
        <button class="category-btn" data-category="양식">
          🍝 양식
        </button>
        <button class="category-btn" data-category="카페">
          ☕ 카페
        </button>
      </div>
    </section>

    <!-- 게시글 통계 -->
    <section class="stats-section">
      <div class="stat-item">
        <span class="stat-label">전체 게시글</span>
        <span class="stat-value" id="totalPosts">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">오늘의 게시글</span>
        <span class="stat-value" id="todayPosts">0</span>
      </div>
    </section>

    <!-- 로딩 -->
    <div id="loading" class="loading" style="display: none;">
      <div class="loading-text">로딩중...</div>
    </div>

    <!-- 게시글 리스트 -->
    <section id="postsGrid" class="posts-grid">
      <!-- 게시글 카드가 동적으로 추가됩니다 -->
    </section>
    <div id="postInfiniteStatus" class="post-infinite-status" aria-live="polite"></div>
    <div id="postInfiniteTrigger" class="post-infinite-trigger" aria-hidden="true"></div>

    <!-- 빈 상태 -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-state-icon">📝</div>
      <p class="empty-state-text">
        아직 게시글이 없어요.<br>
        첫 번째 게시글을 작성해보세요!
      </p>
      <a href="/pages/posts/post-create.html" class="btn btn-primary">
        게시글 작성하기
      </a>
    </div>

    <!-- 검색 결과 없음 -->
    <div id="noResults" class="empty-state" style="display: none;">
      <div class="empty-state-icon">🔍</div>
      <h3 class="empty-state-title">
        검색 결과가 없어요
      </h3>
      <p class="empty-state-description">
        다른 키워드로 검색해보세요
      </p>
      <button id="resetSearch" class="btn btn-secondary">
        전체 보기
      </button>
    </div>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="footer-logo-wrap">
            <div class="footer-logo-icon"><i class="ri-restaurant-2-fill"></i></div>
            <span class="footer-logo-text">파인잇</span>
          </div>
          <p class="footer-tagline">당신만의 맛집을 찾고 공유하는 플랫폼</p>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">서비스</h3>
          <ul class="footer-links-list">
            <li><a href="/pages/posts/post-list.html" class="footer-link">맛집 탐색</a></li>
            <li><a href="/pages/category.html" class="footer-link">카테고리</a></li>
            <li><a href="/pages/restaurants/restaurant-list.html" class="footer-link">맛집 목록</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">고객지원</h3>
          <ul class="footer-links-list">
            <li><a href="#" class="footer-link">공지사항</a></li>
            <li><a href="#" class="footer-link">FAQ</a></li>
            <li><a href="#" class="footer-link">문의하기</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">소셜 미디어</h3>
          <div class="footer-social">
            <a href="#" class="footer-social-btn"><i class="ri-instagram-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-facebook-circle-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-youtube-line"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 파인잇. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="#" class="footer-link">이용약관</a>
          <a href="#" class="footer-link">개인정보처리방침</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="../../js/config/kakao-config.js"></script>
  <script>document.write('<scr'+'ipt src="//dapi.kakao.com/v2/maps/sdk.js?appkey='+window.KAKAO_APP_KEY+'&libraries=services"><\/scr'+'ipt>');</script>
  <script type="module" src="../../js/pages/posts/post-list.js"></script>
  <script type="module" src="../../js/components/header.js"></script>

</body>

</html>
