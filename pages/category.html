<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2020/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Remix Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/common/reset.css">
  <link rel="stylesheet" href="../css/common/variables.css">
  <link rel="stylesheet" href="../css/common/layout.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/button.css">
  <link rel="stylesheet" href="../css/components/card.css">
  <link rel="stylesheet" href="../css/components/footer.css">
  <link rel="stylesheet" href="../css/pages/post-list.css">
  <link rel="stylesheet" href="../css/pages/category.css">
</head>

<body class="post-list-page category-page">
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <main class="post-list-container">

    <!-- 히어로: 카테고리 탭 + 검색 -->
    <section class="post-hero">
      <div class="category-tabs" id="categoryTabs">
        <button class="category-tab" data-category="전체">
          <div class="category-btn-icon" style="background:#f0f9ff;color:#0284c7;"><i class="ri-apps-2-line"></i></div>
          <span>전체</span>
        </button>
        <button class="category-tab" data-category="한식">
          <div class="category-btn-icon" style="background:#fff7ed;color:#ea580c;"><i class="ri-bowl-line"></i></div>
          <span>한식</span>
        </button>
        <button class="category-tab" data-category="중식">
          <div class="category-btn-icon" style="background:#fef2f2;color:#dc2626;"><i class="ri-restaurant-2-line"></i></div>
          <span>중식</span>
        </button>
        <button class="category-tab" data-category="일식">
          <div class="category-btn-icon" style="background:#fdf2f8;color:#db2777;"><i class="ri-cake-3-line"></i></div>
          <span>일식</span>
        </button>
        <button class="category-tab" data-category="양식">
          <div class="category-btn-icon" style="background:#faf5ff;color:#9333ea;"><i class="ri-goblet-line"></i></div>
          <span>양식</span>
        </button>
        <button class="category-tab" data-category="카페">
          <div class="category-btn-icon" style="background:#fffbeb;color:#d97706;"><i class="ri-cup-line"></i></div>
          <span>카페</span>
        </button>
        <button class="category-tab" data-category="디저트">
          <div class="category-btn-icon" style="background:#fff1f2;color:#e11d48;"><i class="ri-cake-2-line"></i></div>
          <span>디저트</span>
        </button>
        <button class="category-tab" data-category="분식">
          <div class="category-btn-icon" style="background:#fefce8;color:#ca8a04;"><i class="ri-restaurant-line"></i></div>
          <span>분식</span>
        </button>
        <button class="category-tab" data-category="치킨">
          <div class="category-btn-icon" style="background:#fff7ed;color:#ea580c;"><i class="ri-fire-line"></i></div>
          <span>치킨</span>
        </button>
      </div>
      <form class="post-search" id="categorySearchForm">
        <input type="text" id="categorySearchInput" placeholder="카테고리 내 검색" autocomplete="off" />
        <button type="submit" class="btn btn-primary">검색</button>
      </form>
    </section>

    <!-- JS 호환용 hidden 요소 -->
    <span id="categoryTitle" style="display:none">한식</span>
    <span id="categoryDescription" style="display:none"></span>
    <span id="postsCount" style="display:none">0</span>
    <select id="sortSelect" style="display:none">
      <option value="latest">최신순</option>
      <option value="popular">인기순</option>
      <option value="rating">평점순</option>
    </select>

    <!-- 로딩 -->
    <div id="loadingState" style="display: none; text-align: center; padding: 2rem; color: #6b7280;">
      맛집을 불러오는 중...
    </div>

    <!-- 그리드 -->
    <section class="post-grid-section">
      <div class="posts-grid" id="postsGrid"></div>
      <div class="post-empty" id="emptyState" style="display: none;">
        <p>아직 등록된 맛집이 없습니다.</p>
      </div>
      <div class="post-actions">
        <div class="post-infinite-status" id="categoryInfiniteStatus" aria-live="polite"></div>
        <div class="post-infinite-trigger" id="categoryInfiniteTrigger" aria-hidden="true"></div>
      </div>
    </section>

  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="footer-logo-wrap">
            <div class="footer-logo-icon"><i class="ri-restaurant-2-fill"></i></div>
            <span class="footer-logo-text">파인잇</span>
          </div>
          <p class="footer-tagline">당신만의 맛집을 찾고 공유하는 플랫폼</p>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">서비스</h3>
          <ul class="footer-links-list">
            <li><a href="/pages/posts/post-list.html" class="footer-link">맛집 탐색</a></li>
            <li><a href="/pages/category.html" class="footer-link">카테고리</a></li>
            <li><a href="/pages/restaurants/restaurant-list.html" class="footer-link">맛집 목록</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">고객지원</h3>
          <ul class="footer-links-list">
            <li><a href="#" class="footer-link">공지사항</a></li>
            <li><a href="#" class="footer-link">FAQ</a></li>
            <li><a href="#" class="footer-link">문의하기</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">소셜 미디어</h3>
          <div class="footer-social">
            <a href="#" class="footer-social-btn"><i class="ri-instagram-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-facebook-circle-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-youtube-line"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 파인잇. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="#" class="footer-link">이용약관</a>
          <a href="#" class="footer-link">개인정보처리방침</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="../js/components/header.js"></script>
  <script type="module" src="../js/pages/category.js"></script>
</body>

</html>
