<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 - 다이닝코드</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Remix Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/common/reset.css">
  <link rel="stylesheet" href="../css/common/variables.css">
  <link rel="stylesheet" href="../css/common/layout.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/button.css">
  <link rel="stylesheet" href="../css/components/card.css">
  <link rel="stylesheet" href="../css/components/footer.css">
  <link rel="stylesheet" href="../css/pages/category.css">
</head>

<body>
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <!-- 메인 컨텐츠 -->
  <main class="category-container">
    <!-- 카테고리 탭 -->
    <section class="category-tabs-section">
      <div class="category-tabs">
        <button class="category-tab" data-category="한식">
          🍚 한식
        </button>
        <button class="category-tab" data-category="중식">
          🥟 중식
        </button>
        <button class="category-tab" data-category="일식">
          🍱 일식
        </button>
        <button class="category-tab" data-category="양식">
          🍝 양식
        </button>
        <button class="category-tab" data-category="카페">
          ☕ 카페
        </button>
        <button class="category-tab" data-category="디저트">
          🍰 디저트
        </button>
        <button class="category-tab" data-category="분식">
          🍢 분식
        </button>
        <button class="category-tab" data-category="치킨">
          🍗 치킨
        </button>
      </div>
    </section>

    <!-- 카테고리 헤더 -->
    <section class="category-header">
      <h1 class="category-title" id="categoryTitle">한식</h1>
      <p class="category-description" id="categoryDescription">전통의 맛과 정성이 담긴 한식당을 만나보세요</p>
    </section>

    <!-- 게시글 목록 -->
    <section class="posts-section">
      <!-- 상단 액션 바 -->
      <div class="posts-actions">
        <div class="posts-count">
          총 <span id="postsCount">0</span>개의 맛집
        </div>
        <div class="posts-controls">
          <select id="sortSelect" class="sort-select">
            <option value="latest">최신순</option>
            <option value="popular">인기순</option>
            <option value="rating">평점순</option>
          </select>
        </div>
      </div>

      <!-- 게시글 그리드 -->
      <div class="posts-grid" id="postsGrid">
        <!-- 게시글 카드들이 여기에 동적으로 추가됨 -->
      </div>

      <!-- 빈 상태 -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">📭</div>
        <p class="empty-message">아직 등록된 맛집이 없습니다</p>
        <p class="empty-submessage">첫 번째 맛집을 소개해주세요!</p>
      </div>

      <!-- 로딩 상태 -->
      <div class="loading-state" id="loadingState" style="display: none;">
        <div class="loading-spinner"></div>
        <p>맛집을 불러오는 중...</p>
      </div>
    </section>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-grid">
        <div class="footer-brand">
          <div class="footer-logo-wrap">
            <div class="footer-logo-icon"><i class="ri-restaurant-2-fill"></i></div>
            <span class="footer-logo-text">파인잇</span>
          </div>
          <p class="footer-tagline">당신만의 맛집을 찾고 공유하는 플랫폼</p>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">서비스</h3>
          <ul class="footer-links-list">
            <li><a href="/pages/posts/post-list.html" class="footer-link">맛집 탐색</a></li>
            <li><a href="/pages/category.html" class="footer-link">카테고리</a></li>
            <li><a href="/pages/restaurants/restaurant-list.html" class="footer-link">맛집 목록</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">고객지원</h3>
          <ul class="footer-links-list">
            <li><a href="#" class="footer-link">공지사항</a></li>
            <li><a href="#" class="footer-link">FAQ</a></li>
            <li><a href="#" class="footer-link">문의하기</a></li>
          </ul>
        </div>
        <div class="footer-col">
          <h3 class="footer-col-title">소셜 미디어</h3>
          <div class="footer-social">
            <a href="#" class="footer-social-btn"><i class="ri-instagram-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-facebook-circle-line"></i></a>
            <a href="#" class="footer-social-btn"><i class="ri-youtube-line"></i></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 파인잇. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="#" class="footer-link">이용약관</a>
          <a href="#" class="footer-link">개인정보처리방침</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="../js/components/header.js"></script>
  <script type="module" src="../js/pages/category.js"></script>
</body>

</html>
