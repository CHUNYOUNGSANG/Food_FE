<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>좋아요한 게시글 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/reset.css">
  <link rel="stylesheet" href="../../css/common/variables.css">
  <link rel="stylesheet" href="../../css/common/layout.css">
  <link rel="stylesheet" href="../../css/components/header.css">
  <link rel="stylesheet" href="../../css/components/button.css">
  <link rel="stylesheet" href="../../css/components/card.css">
  <link rel="stylesheet" href="../../css/components/footer.css">
  <link rel="stylesheet" href="../../css/pages/my-page.css">
</head>

<body>
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <!-- 메인 컨텐츠 -->
  <main class="container">
    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div class="page-header-content">
        <div class="page-icon">❤️</div>
        <div>
          <h1 class="page-title">좋아요한 게시글</h1>
          <p class="page-description">
            내가 좋아요를 누른 맛집 게시글을 확인하세요
          </p>
        </div>
      </div>
      <a href="/pages/my-page/my-posts.html" class="btn btn-secondary">
        ← 마이페이지
      </a>
    </div>

    <!-- 게시글 좋아요 통계 -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-number" id="totalLikes">0</div>
        <div class="stat-label">좋아요한 게시글</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="todayLikes">0</div>
        <div class="stat-label">오늘 좋아요</div>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="loading" style="display: none;">
      <div class="loading-text">로딩중...</div>
    </div>

    <!-- 좋아요한 게시글 목록 -->
    <div id="likedPostsGrid" class="posts-grid">
      <!-- 게시글 카드가 동적으로 추가됩니다 -->
    </div>

    <!-- 빈 상태 -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-state-icon">❤️</div>
      <h3 class="empty-state-title">
        좋아요한 게시글이 없어요
      </h3>
      <p class="empty-state-description">
        마음에 드는 맛집을 발견하면<br>좋아요 버튼을 눌러보세요!
      </p>
      <a href="/index.html" class="btn btn-primary">
        게시글 둘러보기
      </a>
    </div>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <p class="footer-logo">
        🍽️ 파인잇
      </p>
      <p class="footer-copyright">
        맛있는 순간을 나누는 공간 © 2025
      </p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="../../js/pages/my-page/liked-posts.js"></script>
  <script type="module" src="../../js/components/header.js"></script>

  <style>
    /* 페이지 헤더 */
    .page-header {
      background: var(--white);
      padding: var(--spacing-2xl);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      margin-bottom: var(--spacing-2xl);
      border: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--spacing-lg);
    }

    .page-header-content {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .page-icon {
      width: 64px;
      height: 64px;
      background: var(--primary-light);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .page-title {
      font-size: var(--font-3xl);
      font-weight: var(--font-bold);
      color: var(--gray-900);
      margin-bottom: var(--spacing-xs);
    }

    .page-description {
      font-size: var(--font-md);
      color: var(--gray-600);
    }

    /* 통계 */
    .stats-container {
      display: flex;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-2xl);
    }

    .stats-container .stat-card {
      flex: 1;
      background: var(--white);
      padding: var(--spacing-xl);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .stats-container .stat-number {
      font-size: var(--font-4xl);
      font-weight: var(--font-bold);
      color: var(--error-color);
      margin-bottom: var(--spacing-sm);
    }

    .stats-container .stat-label {
      font-size: var(--font-sm);
      color: var(--gray-600);
    }

    /* 게시글 그리드 */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--spacing-xl);
      margin-bottom: var(--spacing-2xl);
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .page-header-content {
        flex-direction: column;
        text-align: center;
      }

      .stats-container {
        flex-direction: column;
      }

      .posts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</body>

</html>
