<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 댓글 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/reset.css">
  <link rel="stylesheet" href="../../css/common/variables.css">
  <link rel="stylesheet" href="../../css/common/layout.css">
  <link rel="stylesheet" href="../../css/components/header.css">
  <link rel="stylesheet" href="../../css/components/button.css">
  <link rel="stylesheet" href="../../css/components/card.css">
  <link rel="stylesheet" href="../../css/components/footer.css">
  <link rel="stylesheet" href="../../css/pages/my-page.css">
</head>

<body>
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <!-- 메인 컨텐츠 -->
  <main class="container">
    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div class="page-header-content">
        <div class="page-icon">💬</div>
        <div>
          <h1 class="page-title">내 댓글</h1>
          <p class="page-description">
            내가 작성한 댓글을 관리하세요
          </p>
        </div>
      </div>
      <a href="/pages/my-page/my-posts.html" class="btn btn-secondary">
        ← 마이페이지
      </a>
    </div>

    <!-- 댓글 통계 -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-number" id="totalComments">0</div>
        <div class="stat-label">전체 댓글</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="todayComments">0</div>
        <div class="stat-label">오늘 작성</div>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="loading" style="display: none;">
      <div class="loading-text">로딩중...</div>
    </div>

    <!-- 댓글 목록 -->
    <div id="commentsList" class="comments-list-container">
      <!-- 댓글이 동적으로 추가됩니다 -->
    </div>

    <!-- 빈 상태 -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-state-icon">💬</div>
      <h3 class="empty-state-title">
        작성한 댓글이 없어요
      </h3>
      <p class="empty-state-description">
        게시글에 첫 댓글을 남겨보세요!
      </p>
      <a href="/index.html" class="btn btn-primary">
        게시글 둘러보기
      </a>
    </div>
    <!-- 댓글 수정 모달 -->
    <div id="editModal" class="modal" style="display: none;">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="modal-title">댓글 수정</h3>
          <button class="modal-close" id="closeModalBtn">✕</button>
        </div>
        <div class="modal-body">
          <form id="editCommentForm">
            <div class="form-group">
              <label for="editContent">댓글 내용</label>
              <textarea id="editContent" class="form-textarea" rows="6" required></textarea>
              <div id="editContentCount" class="form-help-text">
                0 / 500자
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">
                수정 완료
              </button>
              <button type="button" class="btn btn-secondary" id="cancelEditBtn">
                취소
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <p class="footer-logo">
        🍽️ 파인잇
      </p>
      <p class="footer-copyright">
        맛있는 순간을 나누는 공간 © 2025
      </p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="../../js/pages/my-page/my-comments.js"></script>
  <script type="module" src="../../js/components/header.js"></script>

  <style>
    /* 페이지 헤더 */
    .page-header {
      background: var(--white);
      padding: var(--spacing-2xl);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      margin-bottom: var(--spacing-2xl);
      border: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--spacing-lg);
    }

    .page-header-content {
      display: flex;
      align-items: center;
      gap: var(--spacing-lg);
    }

    .page-icon {
      width: 64px;
      height: 64px;
      background: var(--primary-light);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .page-title {
      font-size: var(--font-3xl);
      font-weight: var(--font-bold);
      color: var(--gray-900);
      margin-bottom: var(--spacing-xs);
    }

    .page-description {
      font-size: var(--font-md);
      color: var(--gray-600);
    }

    /* 통계 */
    .stats-container {
      display: flex;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-2xl);
    }

    .stats-container .stat-card {
      flex: 1;
      background: var(--white);
      padding: var(--spacing-xl);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .stats-container .stat-number {
      font-size: var(--font-4xl);
      font-weight: var(--font-bold);
      color: var(--primary-color);
      margin-bottom: var(--spacing-sm);
    }

    .stats-container .stat-label {
      font-size: var(--font-sm);
      color: var(--gray-600);
    }

    /* 댓글 목록 컨테이너 */
    .comments-list-container {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-200);
      overflow: hidden;
    }

    /* 댓글 카드 */
    .comment-card {
      padding: var(--spacing-xl);
      border-bottom: 1px solid var(--gray-200);
      transition: background-color 0.3s;
    }

    .comment-card:last-child {
      border-bottom: none;
    }

    .comment-card:hover {
      background: var(--gray-50);
    }

    .comment-card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: var(--spacing-md);
    }

    .comment-post-info {
      flex: 1;
    }

    .comment-post-title {
      font-size: var(--font-lg);
      font-weight: var(--font-semibold);
      color: var(--gray-900);
      margin-bottom: var(--spacing-xs);
      cursor: pointer;
      transition: color 0.3s;
    }

    .comment-post-title:hover {
      color: var(--primary-color);
    }

    .comment-date {
      font-size: var(--font-sm);
      color: var(--gray-500);
    }

    .comment-actions {
      display: flex;
      gap: var(--spacing-sm);
    }

    .comment-content-box {
      background: var(--gray-50);
      padding: var(--spacing-lg);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--primary-color);
      margin-bottom: var(--spacing-md);
    }

    .comment-text {
      font-size: var(--font-md);
      color: var(--gray-800);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .comment-deleted {
      opacity: 0.6;
    }

    .comment-deleted-text {
      color: var(--gray-500);
      font-style: italic;
    }

    /* 모달 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-xl);
      border-bottom: 1px solid var(--gray-200);
    }

    .modal-title {
      font-size: var(--font-xl);
      font-weight: var(--font-bold);
      color: var(--gray-900);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--gray-100);
      border-radius: 50%;
      font-size: var(--font-lg);
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: var(--gray-200);
      color: var(--gray-900);
    }

    .modal-body {
      padding: var(--spacing-xl);
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
        align-items: stretch;
      }

      .page-header-content {
        flex-direction: column;
        text-align: center;
      }

      .stats-container {
        flex-direction: column;
      }

      .comment-card-header {
        flex-direction: column;
        gap: var(--spacing-md);
      }

      .comment-actions {
        width: 100%;
      }

      .comment-actions button {
        flex: 1;
      }
    }
  </style>
</body>

</html>
