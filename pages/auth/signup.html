<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - 파인잇</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Remix Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.1.0/remixicon.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/common/reset.css">
  <link rel="stylesheet" href="../../css/common/variables.css">
  <link rel="stylesheet" href="../../css/pages/auth.css">
</head>

<body class="auth-page">
  <div class="auth-split">

    <!-- 왼쪽: 비주얼 -->
    <div class="auth-visual-side signup-visual-side">

      <!-- 로고 (왼쪽 상단) -->
      <div class="signup-visual-logo">
        <a href="/index.html" class="auth-logo">
          <div class="auth-logo-icon"><i class="ri-restaurant-2-fill"></i></div>
          <span class="auth-logo-text">파인잇</span>
        </a>
      </div>

      <!-- 비주얼 콘텐츠 -->
      <div class="signup-visual-content">
        <!-- 원형 비주얼 -->
        <div class="signup-visual-circle">
          <span class="signup-visual-emoji">🍽️</span>
        </div>

        <h2 class="signup-visual-title">맛있는 경험을<br>함께 나눠요</h2>
        <p class="signup-visual-desc">파인잇에서 나만의 맛집을 기록하고<br>다른 미식가들과 소통해보세요</p>

        <!-- 기능 카드들 -->
        <div class="signup-features">
          <div class="signup-feature-card">
            <div class="signup-feature-icon" style="background:#fff7ed;">
              <i class="ri-quill-pen-line" style="color:#ea580c;"></i>
            </div>
            <span class="signup-feature-label">리뷰 작성</span>
          </div>
          <div class="signup-feature-card">
            <div class="signup-feature-icon" style="background:#fdf2f8;">
              <i class="ri-heart-3-line" style="color:#db2777;"></i>
            </div>
            <span class="signup-feature-label">맛집 저장</span>
          </div>
          <div class="signup-feature-card">
            <div class="signup-feature-icon" style="background:#fffbeb;">
              <i class="ri-group-line" style="color:#d97706;"></i>
            </div>
            <span class="signup-feature-label">소통하기</span>
          </div>
        </div>
      </div>

    </div>

    <!-- 오른쪽: 폼 -->
    <div class="auth-form-side signup-form-side">
      <div class="auth-form-inner">

        <!-- 모바일 전용 로고 -->
        <a href="/index.html" class="auth-logo auth-logo-mobile">
          <div class="auth-logo-icon"><i class="ri-restaurant-2-fill"></i></div>
          <span class="auth-logo-text">파인잇</span>
        </a>

        <!-- 타이틀 -->
        <h1 class="auth-title">회원가입</h1>
        <p class="auth-subtitle">파인잇과 함께 맛집 여정을 시작하세요</p>

        <!-- 회원가입 폼 -->
        <form id="signupForm" class="auth-form">

          <!-- 이름 + 닉네임 2열 -->
          <div class="auth-field-grid">

            <!-- 이름 -->
            <div class="auth-field">
              <div class="auth-label-row">
                <label class="auth-label" for="name">이름</label>
                <span id="nameValidationMsg" class="label-help-text"></span>
              </div>
              <div class="auth-input-wrap">
                <i class="ri-user-line auth-input-icon"></i>
                <input type="text" id="name" class="auth-input form-input" placeholder="홍길동" required
                  autocomplete="name">
              </div>
            </div>

            <!-- 닉네임 -->
            <div class="auth-field">
              <div class="auth-label-row">
                <label class="auth-label" for="nickname">닉네임</label>
                <span id="nicknameValidationMsg" class="label-help-text"></span>
              </div>
              <div class="auth-input-inline">
                <div class="auth-input-wrap auth-input-grow">
                  <i class="ri-at-line auth-input-icon"></i>
                  <input type="text" id="nickname" class="auth-input form-input" placeholder="맛집헌터" required
                    autocomplete="username">
                </div>
                <button type="button" id="checkNicknameBtn" class="auth-dup-btn">중복확인</button>
              </div>
            </div>

          </div>

          <!-- 이메일 -->
          <div class="auth-field">
            <div class="auth-label-row">
              <label class="auth-label" for="email">이메일</label>
              <span id="emailValidationMsg" class="label-help-text"></span>
            </div>
            <div class="auth-input-inline">
              <div class="auth-input-wrap auth-input-grow">
                <i class="ri-mail-line auth-input-icon"></i>
                <input type="email" id="email" class="auth-input form-input" placeholder="example@email.com" required
                  autocomplete="email">
              </div>
              <button type="button" id="checkEmailBtn" class="auth-dup-btn">중복확인</button>
            </div>
          </div>

          <!-- 비밀번호 -->
          <div class="auth-field">
            <div class="auth-label-row">
              <label class="auth-label" for="password">비밀번호</label>
              <span id="passwordValidationMsg" class="label-help-text"></span>
            </div>
            <div class="auth-input-wrap">
              <i class="ri-lock-line auth-input-icon"></i>
              <input type="password" id="password" class="auth-input form-input auth-input-pw"
                placeholder="8자 이상, 영문/숫자 포함" required autocomplete="new-password">
              <button type="button" class="auth-pw-toggle" id="pwToggleBtn1" tabindex="-1">
                <i class="ri-eye-line" id="pwToggleIcon1"></i>
              </button>
            </div>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="auth-field">
            <div class="auth-label-row">
              <label class="auth-label" for="passwordConfirm">비밀번호 확인</label>
              <span id="passwordConfirmValidationMsg" class="label-help-text"></span>
            </div>
            <div class="auth-input-wrap">
              <i class="ri-lock-2-line auth-input-icon"></i>
              <input type="password" id="passwordConfirm" class="auth-input form-input auth-input-pw"
                placeholder="비밀번호를 다시 입력하세요" required autocomplete="new-password">
              <button type="button" class="auth-pw-toggle" id="pwToggleBtn2" tabindex="-1">
                <i class="ri-eye-line" id="pwToggleIcon2"></i>
              </button>
            </div>
          </div>

          <!-- 프로필 이미지 (선택) -->
          <div class="auth-field">
            <label class="auth-label" for="profileImage">프로필 이미지 <span class="auth-optional">(선택)</span></label>
            <label class="auth-upload-label" for="profileImage">
              <i class="ri-image-add-line"></i>
              <span id="uploadLabelText">이미지를 선택하세요</span>
            </label>
            <input type="file" id="profileImage" class="auth-file-input" accept="image/*">
            <div id="imagePreview" class="auth-image-preview" style="display: none;">
              <img id="imagePreviewImg" src="" alt="프로필 미리보기">
              <button type="button" id="removeImageBtn" class="auth-image-remove">
                <i class="ri-close-line"></i>
              </button>
            </div>
          </div>

          <!-- 가입하기 버튼 -->
          <button type="submit" id="signupBtn" class="auth-submit-btn" disabled>
            <span id="signupBtnText">가입하기</span>
            <i class="ri-arrow-right-line" id="signupBtnIcon"></i>
          </button>

        </form>

        <!-- 구분선 -->
        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">또는</span>
          <div class="auth-divider-line"></div>
        </div>

        <!-- 소셜 로그인 -->
        <div class="auth-social">
          <button type="button" class="auth-social-btn auth-naver-btn" id="naverSignupBtn">
            <div class="auth-naver-icon">N</div>
            네이버
          </button>
          <button type="button" class="auth-social-btn auth-kakao-btn" id="kakaoSignupBtn">
            <div class="auth-kakao-icon"><i class="ri-chat-1-fill"></i></div>
            카카오
          </button>
        </div>

        <!-- 로그인 링크 -->
        <p class="auth-switch">
          이미 계정이 있으신가요?
          <a href="./login.html" class="auth-switch-link">로그인</a>
        </p>

      </div>
    </div>

  </div>

  <!-- JavaScript -->
  <script type="module" src="../../js/pages/auth/signup.js"></script>
</body>

</html>
