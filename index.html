<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파인잇 - 최고의 한입</title>

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/common/reset.css">
  <link rel="stylesheet" href="./css/common/variables.css">
  <link rel="stylesheet" href="./css/common/layout.css">
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/button.css">
  <link rel="stylesheet" href="./css/components/card.css">
  <link rel="stylesheet" href="./css/components/footer.css">
  <link rel="stylesheet" href="./css/pages/home.css">
</head>

<body class="home-page">
  <!-- 헤더 -->
  <header id="header" class="site-header"></header>

  <!-- 메인 컨텐츠 -->
  <main class="home-container">
    <!-- 카테고리 바 -->
    <section class="category-bar" aria-label="카테고리">
      <div class="category-list" id="categoryList"></div>
    </section>

    <!-- 추천 맛집 -->
    <section class="recommend-section">
      <div class="section-header">
        <h2 class="section-title">추천 맛집</h2>
        <a href="/pages/restaurants/restaurant-list.html" class="view-all-link">전체보기 →</a>
      </div>
      <div class="recommend-grid" id="recommendGrid">
        <!-- 추천 맛집 카드가 동적으로 추가됨 -->
      </div>
    </section>

    <!-- 실시간 Top 10 섹션 -->
    <section class="top10-section">
      <div class="section-header" style="margin-bottom: var(--spacing-lg);">
        <h1 class="section-title" style="margin: 0; text-align: left;">실시간 Top 10</h1>
        <a href="/pages/posts/post-list.html" class="view-all-link">전체보기 →</a>
      </div>
      <p class="section-subtitle">지금 가장 많이 찾는 인기 카테고리</p>

      <div class="top10-carousel" id="top10Carousel" aria-live="polite">
        <!-- Top 10 게시글이 동적으로 렌더링됩니다 -->
      </div>
    </section>

    <!-- 최근 게시글 섹션 -->
    <section class="recent-posts-section">
      <div class="section-header">
        <h2 class="section-title">최근 게시글</h2>
        <a href="/pages/posts/post-list.html" class="view-all-link">전체보기 →</a>
      </div>

      <div class="posts-grid" id="recentPostsGrid">
        <!-- 게시글 카드들이 여기에 동적으로 추가됨 -->
      </div>
    </section>
  </main>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="footer-container">
      <p class="footer-logo">
        🍽️ 파인잇
      </p>
      <p class="footer-copyright">
        맛있는 순간을 나누는 공간 © 2026
      </p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script type="module" src="./js/components/header.js"></script>
  <script type="module" src="./js/pages/home.js"></script>
</body>

</html>
